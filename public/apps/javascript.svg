<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="50" height="50" viewBox="0 0 50 50">
  <defs>
    <pattern id="pattern" preserveAspectRatio="none" width="100%" height="100%" viewBox="0 0 1024 1024">
      <image width="1024" height="1024" xlink:href="data:image/png;base64,"/>
    </pattern>
    <filter id="javascript" x="0" y="0" width="50" height="50" filterUnits="userSpaceOnUse">
      <feOffset dy="3" input="SourceAlpha"/>
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-opacity="0.251"/>
      <feComposite operator="in" in2="blur"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  <g transform="matrix(1, 0, 0, 1, 0, 0)" filter="url(#javascript)">
    <rect id="javascript-2" data-name="javascript" width="32" height="32" rx="8" transform="translate(9 6)" fill="url(#pattern)"/>
  </g>
</svg>
